
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net

  app:
    build: .
    depends_on:
      - db
    volumes:
    - ./docker_configs/config.json:/etc/mywebapp/config.json
    networks:
      - app_net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker_configs/mywebapp.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app_net

volumes:
  postgres_data:

networks:
  app_net: